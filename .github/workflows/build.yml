name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  VERSION: "1.0.3"

jobs:
  build-macos:
    name: macOS App (ARM64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (aarch64-apple-darwin)
        run: |
          rustup update stable
          rustup target add aarch64-apple-darwin

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-arm64-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release
        run: cargo build --release -p photocd-gui --target aarch64-apple-darwin

      - name: Create .app bundle
        run: |
          APP="dist/Photo CD Player.app"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp target/aarch64-apple-darwin/release/photocd-player "$APP/Contents/MacOS/Photo CD Player"
          chmod +x "$APP/Contents/MacOS/Photo CD Player"
          cp icons/PhotoCDLogo.icns "$APP/Contents/Resources/PhotoCDLogo.icns"
          cat > "$APP/Contents/Info.plist" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key><string>Photo CD Player</string>
            <key>CFBundleDisplayName</key><string>Photo CD Player</string>
            <key>CFBundleIdentifier</key><string>com.photocd.player</string>
            <key>CFBundleVersion</key><string>1.0.3</string>
            <key>CFBundleShortVersionString</key><string>1.0.3</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>CFBundleExecutable</key><string>Photo CD Player</string>
            <key>CFBundleIconFile</key><string>PhotoCDLogo</string>
            <key>LSMinimumSystemVersion</key><string>11.0</string>
            <key>NSHighResolutionCapable</key><true/>
          </dict>
          </plist>
          PLIST

      - name: Ad-hoc sign
        run: codesign --force --deep --sign - "dist/Photo CD Player.app"

      - name: Zip .app
        run: |
          cd dist
          zip -r "Photo CD Player_macOS_v${{ env.VERSION }}.zip" "Photo CD Player.app"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PhotoCDPlayer-macOS
          path: "dist/Photo CD Player_macOS_v${{ env.VERSION }}.zip"
          retention-days: 1

  build-windows:
    name: Windows EXE
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: rustup update stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release
        run: cargo build --release -p photocd-gui

      - name: Rename EXE
        shell: pwsh
        run: |
          Copy-Item "target/release/photocd-player.exe" "Photo CD Player_Windows_v${{ env.VERSION }}.exe"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PhotoCDPlayer-Windows
          path: "Photo CD Player_Windows_v${{ env.VERSION }}.exe"
          retention-days: 1

  build-linux:
    name: Linux AppImage
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            libasound2-dev libgtk-3-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libayatana-appindicator3-dev librsvg2-dev libfuse2 pkg-config

      - name: Install Rust
        run: rustup update stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release
        run: cargo build --release -p photocd-gui

      - name: Build AppImage
        run: |
          set -e
          wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" -O appimagetool
          chmod +x appimagetool

          mkdir -p AppDir/usr/bin AppDir/usr/share/applications AppDir/usr/share/icons/hicolor/256x256/apps
          cp target/release/photocd-player AppDir/usr/bin/photocd-player
          cp icons/PhotoCDLogo.png AppDir/usr/share/icons/hicolor/256x256/apps/photocd-player.png
          cp icons/PhotoCDLogo.png AppDir/photocd-player.png

          cat > AppDir/usr/share/applications/photocd-player.desktop <<'EOF'
          [Desktop Entry]
          Name=Photo CD Player
          Comment=Play Kodak Photo CD disc images
          Exec=photocd-player
          Icon=photocd-player
          Type=Application
          Categories=Graphics;Viewer;
          StartupWMClass=photocd-player
          EOF
          cp AppDir/usr/share/applications/photocd-player.desktop AppDir/photocd-player.desktop

          cat > AppDir/AppRun <<'EOF'
          #!/bin/bash
          SELF=$(readlink -f "$0")
          HERE=$(dirname "$SELF")
          exec "$HERE/usr/bin/photocd-player" "$@"
          EOF
          chmod +x AppDir/AppRun

          ARCH=x86_64 ./appimagetool AppDir "Photo CD Player_Linux_v${{ env.VERSION }}.AppImage"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PhotoCDPlayer-Linux
          path: "Photo CD Player_Linux_v${{ env.VERSION }}.AppImage"
          retention-days: 1

  release:
    name: Publish Release
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: Photo CD Player v${{ env.VERSION }}
          draft: false
          prerelease: false
          make_latest: true
          body: |
            ## Photo CD Player v${{ env.VERSION }}

            Decodes and plays Kodak Photo CD disc images (.cue/.bin). Also supports store-mode ZIP and 7z archives.

            ### Downloads
            | Platform | File |
            |----------|------|
            | macOS (ARM64) | `Photo CD Player_macOS_v${{ env.VERSION }}.zip` |
            | Windows | `Photo CD Player_Windows_v${{ env.VERSION }}.exe` |
            | Linux | `Photo CD Player_Linux_v${{ env.VERSION }}.AppImage` |

            ### Supported formats
            - Photo CD: Base, 4Base, 16Base
            - Standalone `.pcd` and `.rgb` files
            - Store-mode `.zip` and `.7z` archives
          files: |
            artifacts/PhotoCDPlayer-macOS/Photo CD Player_macOS_v${{ env.VERSION }}.zip
            artifacts/PhotoCDPlayer-Windows/Photo CD Player_Windows_v${{ env.VERSION }}.exe
            artifacts/PhotoCDPlayer-Linux/Photo CD Player_Linux_v${{ env.VERSION }}.AppImage
