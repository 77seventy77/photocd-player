name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    name: Windows EXE
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pillow numpy pygame cairosvg pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --noconfirm --windowed --onedir `
            --name "Photo CD Player" `
            --icon "App Icon/PhotoCDLogo.ico" `
            --add-data "assets;assets" `
            --add-data "photocd_fs_reader.py;." `
            --add-data "photocd_disc_map.py;." `
            --add-data "photocd_hires.py;." `
            --add-data "photocd_playlist_parse.py;." `
            --hidden-import PIL `
            --hidden-import PIL.Image `
            --hidden-import PIL.ImageTk `
            --hidden-import numpy `
            --hidden-import pygame `
            --hidden-import cairosvg `
            --hidden-import cssselect2 `
            --hidden-import tinycss2 `
            --hidden-import cairocffi `
            photocd_decoder.py

      - name: Zip Windows build
        run: Compress-Archive -Path "dist/Photo CD Player" -DestinationPath "PhotoCDPlayer-Windows.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PhotoCDPlayer-Windows
          path: PhotoCDPlayer-Windows.zip
          retention-days: 1

  build-macos:
    name: macOS App (ARM64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          brew install cairo
          pip install pillow numpy pygame cairosvg pyinstaller

      - name: Convert PNG to ICNS
        run: |
          mkdir -p /tmp/PhotoCD.iconset
          for size in 16 32 128 256 512; do
            sips -z $size $size "App Icon/PhotoCDLogo.png" --out /tmp/PhotoCD.iconset/icon_${size}x${size}.png
            double=$((size * 2))
            sips -z $double $double "App Icon/PhotoCDLogo.png" --out /tmp/PhotoCD.iconset/icon_${size}x${size}@2x.png
          done
          iconutil -c icns /tmp/PhotoCD.iconset -o "App Icon/PhotoCDLogo.icns"

      - name: Build .app
        run: |
          CAIRO_LIB=$(brew --prefix cairo)/lib/libcairo.2.dylib
          pyinstaller --noconfirm --windowed --onedir \
            --name "Photo CD Player" \
            --icon "App Icon/PhotoCDLogo.icns" \
            --target-arch arm64 \
            --add-data "assets:assets" \
            --add-data "photocd_fs_reader.py:." \
            --add-data "photocd_disc_map.py:." \
            --add-data "photocd_hires.py:." \
            --add-data "photocd_playlist_parse.py:." \
            --add-binary "$CAIRO_LIB:." \
            --runtime-hook "rthook_cairo.py" \
            --hidden-import PIL \
            --hidden-import PIL.Image \
            --hidden-import PIL.ImageTk \
            --hidden-import numpy \
            --hidden-import pygame \
            --hidden-import cairosvg \
            --hidden-import cssselect2 \
            --hidden-import tinycss2 \
            --hidden-import cairocffi \
            photocd_decoder.py

      - name: Ad-hoc sign the app
        run: |
          codesign --force --deep --sign - "dist/Photo CD Player.app"

      - name: Create DMG
        run: |
          brew install create-dmg
          create-dmg \
            --volname "Photo CD Player" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "Photo CD Player.app" 150 185 \
            --hide-extension "Photo CD Player.app" \
            --app-drop-link 450 185 \
            "dist/Photo CD Player.dmg" \
            "dist/Photo CD Player.app"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PhotoCDPlayer-macOS
          path: dist/Photo CD Player.dmg
          retention-days: 1

  build-linux-bundle:
    name: Linux PyInstaller bundle
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y libgirepository1.0-dev libcairo2-dev pkg-config \
            python3-dev gir1.2-gtk-3.0 libgtk-3-dev

      - name: Install Python dependencies
        run: pip install pillow numpy pygame cairosvg pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller --noconfirm --windowed --onedir \
            --name "Photo CD Player" \
            --add-data "assets:assets" \
            --add-data "photocd_fs_reader.py:." \
            --add-data "photocd_disc_map.py:." \
            --add-data "photocd_hires.py:." \
            --add-data "photocd_playlist_parse.py:." \
            --hidden-import PIL \
            --hidden-import PIL.Image \
            --hidden-import PIL.ImageTk \
            --hidden-import numpy \
            --hidden-import pygame \
            --hidden-import cairosvg \
            --hidden-import cssselect2 \
            --hidden-import tinycss2 \
            --hidden-import cairocffi \
            photocd_decoder.py

      - name: Upload PyInstaller bundle
        uses: actions/upload-artifact@v4
        with:
          name: linux-pyinstaller-bundle
          path: dist/Photo CD Player/
          retention-days: 1

  build-linux:
    name: Linux Flatpak
    needs: build-linux-bundle
    runs-on: ubuntu-22.04
    container:
      image: bilelmoussaoui/flatpak-github-actions:freedesktop-23.08
      options: --privileged
    steps:
      - uses: actions/checkout@v4

      - name: Download PyInstaller bundle
        uses: actions/download-artifact@v4
        with:
          name: linux-pyinstaller-bundle
          path: dist/photocd-player-bundle

      - name: Restore executable bit
        run: chmod +x "dist/photocd-player-bundle/Photo CD Player"

      - name: Prepare Flatpak resources
        run: |
          cat > com.photocd.Player.desktop <<'EOF'
          [Desktop Entry]
          Name=Photo CD Player
          Comment=Play Kodak Photo CD disc images
          Exec=photocd-player
          Icon=com.photocd.Player
          Type=Application
          Categories=Graphics;Viewer;
          EOF

          cat > com.photocd.Player.metainfo.xml <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <component type="desktop-application">
            <id>com.photocd.Player</id>
            <name>Photo CD Player</name>
            <summary>Play Kodak Photo CD disc images</summary>
            <metadata_license>CC0-1.0</metadata_license>
            <project_license>GPL-3.0-or-later</project_license>
            <description><p>Decodes and plays Kodak Photo CD disc images.</p></description>
            <launchable type="desktop-id">com.photocd.Player.desktop</launchable>
            <releases><release version="1.01" date="2026-04-04"/></releases>
            <content_rating type="oars-1.1"/>
          </component>
          EOF

          cat > photocd-player.sh <<'EOF'
          #!/bin/bash
          exec "/app/share/photocd-player/Photo CD Player" "$@"
          EOF
          chmod +x photocd-player.sh

          # Flatpak requires icons ≤ 512x512; source is 1024x1024
          python3 -c "from PIL import Image; Image.open('App Icon/PhotoCDLogo.png').resize((256,256), Image.LANCZOS).save('com.photocd.Player.png')" \
            || (apt-get update && apt-get install -y imagemagick && convert "App Icon/PhotoCDLogo.png" -resize 256x256 com.photocd.Player.png)

          cat > com.photocd.Player.yml <<'EOF'
          app-id: com.photocd.Player
          runtime: org.freedesktop.Platform
          runtime-version: '23.08'
          sdk: org.freedesktop.Sdk
          command: photocd-player
          finish-args:
            - --share=ipc
            - --socket=x11
            - --socket=wayland
            - --socket=pulseaudio
            - --device=dri
            - --filesystem=home
          modules:
            - name: photocd-player
              buildsystem: simple
              build-commands:
                - mkdir -p /app/bin /app/share/photocd-player
                - cp -r dist/photocd-player-bundle/. /app/share/photocd-player/
                - install -Dm755 photocd-player.sh /app/bin/photocd-player
                - install -Dm644 com.photocd.Player.desktop /app/share/applications/com.photocd.Player.desktop
                - install -Dm644 com.photocd.Player.png /app/share/icons/hicolor/256x256/apps/com.photocd.Player.png
                - install -Dm644 com.photocd.Player.metainfo.xml /app/share/metainfo/com.photocd.Player.metainfo.xml
              sources:
                - type: dir
                  path: .
          EOF

      - name: Build Flatpak bundle
        uses: flathub-infra/flatpak-github-actions/flatpak-builder@master
        with:
          bundle: PhotoCDPlayer-Linux.flatpak
          manifest-path: com.photocd.Player.yml
          cache-key: flatpak-${{ github.sha }}

  release:
    name: Publish Release
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.01
          name: Photo CD Player v1.01
          draft: false
          prerelease: false
          make_latest: true
          body: |
            ## Photo CD Player v1.01

            Decodes and plays Kodak Photo CD disc images (.cue/.bin).

            ### Downloads
            | Platform | File |
            |----------|------|
            | macOS (ARM64) | `Photo CD Player.dmg` |
            | Windows | `PhotoCDPlayer-Windows.zip` |
            | Linux | `PhotoCDPlayer-Linux.flatpak` |

            ### Supported formats
            - Photo CD Master (Base, 4Base, 16Base)
            - Photo CD Portfolio (Base)
            - Standalone `.pcd` and `.rgb` files
          files: |
            artifacts/PhotoCDPlayer-macOS/Photo CD Player.dmg
            artifacts/PhotoCDPlayer-Windows/PhotoCDPlayer-Windows.zip
            artifacts/PhotoCDPlayer-Linux.flatpak/PhotoCDPlayer-Linux.flatpak
