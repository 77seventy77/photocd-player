name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    name: Windows EXE
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pillow numpy pygame cairosvg pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --noconfirm --windowed --onedir `
            --name "Photo CD Player" `
            --icon "App Icon/PhotoCDLogo.ico" `
            --add-data "assets;assets" `
            --add-data "photocd_fs_reader.py;." `
            --add-data "photocd_disc_map.py;." `
            --add-data "photocd_hires.py;." `
            --add-data "photocd_playlist_parse.py;." `
            --hidden-import PIL `
            --hidden-import PIL.Image `
            --hidden-import PIL.ImageTk `
            --hidden-import numpy `
            --hidden-import pygame `
            --hidden-import cairosvg `
            --hidden-import cssselect2 `
            --hidden-import tinycss2 `
            --hidden-import cairocffi `
            photocd_decoder.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: PhotoCDPlayer-Windows
          path: dist/Photo CD Player/
          retention-days: 30

  build-macos:
    name: macOS App (ARM64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install pillow numpy pygame cairosvg pyinstaller

      - name: Convert PNG to ICNS
        run: |
          mkdir -p /tmp/PhotoCD.iconset
          for size in 16 32 128 256 512; do
            sips -z $size $size "App Icon/PhotoCDLogo.png" --out /tmp/PhotoCD.iconset/icon_${size}x${size}.png
            double=$((size * 2))
            sips -z $double $double "App Icon/PhotoCDLogo.png" --out /tmp/PhotoCD.iconset/icon_${size}x${size}@2x.png
          done
          iconutil -c icns /tmp/PhotoCD.iconset -o "App Icon/PhotoCDLogo.icns"

      - name: Build .app
        run: |
          pyinstaller --noconfirm --windowed --onedir \
            --name "Photo CD Player" \
            --icon "App Icon/PhotoCDLogo.icns" \
            --target-arch arm64 \
            --add-data "assets:assets" \
            --add-data "photocd_fs_reader.py:." \
            --add-data "photocd_disc_map.py:." \
            --add-data "photocd_hires.py:." \
            --add-data "photocd_playlist_parse.py:." \
            --hidden-import PIL \
            --hidden-import PIL.Image \
            --hidden-import PIL.ImageTk \
            --hidden-import numpy \
            --hidden-import pygame \
            --hidden-import cairosvg \
            --hidden-import cssselect2 \
            --hidden-import tinycss2 \
            --hidden-import cairocffi \
            photocd_decoder.py

      - name: Create DMG
        run: |
          brew install create-dmg
          create-dmg \
            --volname "Photo CD Player" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "Photo CD Player.app" 150 185 \
            --hide-extension "Photo CD Player.app" \
            --app-drop-link 450 185 \
            "dist/Photo CD Player.dmg" \
            "dist/Photo CD Player.app"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: PhotoCDPlayer-macOS
          path: dist/Photo CD Player.dmg
          retention-days: 30

  build-linux-flatpak:
    name: Linux Flatpak
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Flatpak and flatpak-builder
        run: |
          sudo apt-get update -q
          sudo apt-get install -y flatpak flatpak-builder
          sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install -y flathub org.freedesktop.Platform//23.08 org.freedesktop.Sdk//23.08

      - name: Write Flatpak manifest
        run: |
          cat > com.photocd.player.yml << 'MANIFEST'
          app-id: com.photocd.player
          runtime: org.freedesktop.Platform
          runtime-version: "23.08"
          sdk: org.freedesktop.Sdk
          command: photocd-player
          finish-args:
            - --share=ipc
            - --socket=x11
            - --socket=wayland
            - --socket=pulseaudio
            - --filesystem=host
            - --device=dri
          modules:
            - name: python3-deps
              buildsystem: simple
              build-commands:
                - pip3 install --prefix=/app --no-deps pillow numpy pygame cairosvg cssselect2 tinycss2 cairocffi webencodings
              sources:
                - type: shell
                  commands:
                    - pip3 download --no-deps pillow numpy pygame cairosvg cssselect2 tinycss2 cairocffi webencodings -d /tmp/wheels
            - name: photocd-player
              buildsystem: simple
              build-commands:
                - install -Dm755 photocd_decoder.py /app/bin/photocd-player
                - install -Dm644 photocd_fs_reader.py /app/lib/photocd/photocd_fs_reader.py
                - install -Dm644 photocd_disc_map.py /app/lib/photocd/photocd_disc_map.py
                - install -Dm644 photocd_hires.py /app/lib/photocd/photocd_hires.py
                - install -Dm644 photocd_playlist_parse.py /app/lib/photocd/photocd_playlist_parse.py
                - cp -r assets /app/lib/photocd/assets
                - install -Dm644 "App Icon/PhotoCDLogo.png" /app/share/icons/hicolor/256x256/apps/com.photocd.player.png
                - install -Dm644 com.photocd.player.desktop /app/share/applications/com.photocd.player.desktop
              sources:
                - type: dir
                  path: .
          MANIFEST

          cat > com.photocd.player.desktop << 'DESKTOP'
          [Desktop Entry]
          Name=Photo CD Player
          Comment=Play Kodak Photo CD disc images
          Exec=photocd-player
          Icon=com.photocd.player
          Type=Application
          Categories=Graphics;Viewer;
          DESKTOP

      - name: Build Flatpak
        run: |
          flatpak-builder --repo=repo --force-clean build-flatpak com.photocd.player.yml
          flatpak build-bundle repo PhotoCDPlayer-Linux.flatpak com.photocd.player

      - name: Upload Flatpak artifact
        uses: actions/upload-artifact@v4
        with:
          name: PhotoCDPlayer-Linux
          path: PhotoCDPlayer-Linux.flatpak
          retention-days: 30
