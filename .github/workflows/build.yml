name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    name: Windows EXE
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pillow numpy pygame cairosvg pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --noconfirm --windowed --onedir `
            --name "Photo CD Player" `
            --icon "App Icon/PhotoCDLogo.ico" `
            --add-data "assets;assets" `
            --add-data "photocd_fs_reader.py;." `
            --add-data "photocd_disc_map.py;." `
            --add-data "photocd_hires.py;." `
            --add-data "photocd_playlist_parse.py;." `
            --hidden-import PIL `
            --hidden-import PIL.Image `
            --hidden-import PIL.ImageTk `
            --hidden-import numpy `
            --hidden-import pygame `
            --hidden-import cairosvg `
            --hidden-import cssselect2 `
            --hidden-import tinycss2 `
            --hidden-import cairocffi `
            photocd_decoder.py

      - name: Zip Windows build
        run: Compress-Archive -Path "dist/Photo CD Player" -DestinationPath "PhotoCDPlayer-Windows.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PhotoCDPlayer-Windows
          path: PhotoCDPlayer-Windows.zip
          retention-days: 1

  build-macos:
    name: macOS App (ARM64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          brew install cairo
          pip install pillow numpy pygame cairosvg pyinstaller

      - name: Convert PNG to ICNS
        run: |
          mkdir -p /tmp/PhotoCD.iconset
          for size in 16 32 128 256 512; do
            sips -z $size $size "App Icon/PhotoCDLogo.png" --out /tmp/PhotoCD.iconset/icon_${size}x${size}.png
            double=$((size * 2))
            sips -z $double $double "App Icon/PhotoCDLogo.png" --out /tmp/PhotoCD.iconset/icon_${size}x${size}@2x.png
          done
          iconutil -c icns /tmp/PhotoCD.iconset -o "App Icon/PhotoCDLogo.icns"

      - name: Build .app
        run: |
          CAIRO_LIB=$(brew --prefix cairo)/lib/libcairo.2.dylib
          pyinstaller --noconfirm --windowed --onedir \
            --name "Photo CD Player" \
            --icon "App Icon/PhotoCDLogo.icns" \
            --target-arch arm64 \
            --add-data "assets:assets" \
            --add-data "photocd_fs_reader.py:." \
            --add-data "photocd_disc_map.py:." \
            --add-data "photocd_hires.py:." \
            --add-data "photocd_playlist_parse.py:." \
            --add-binary "$CAIRO_LIB:." \
            --runtime-hook "rthook_cairo.py" \
            --hidden-import PIL \
            --hidden-import PIL.Image \
            --hidden-import PIL.ImageTk \
            --hidden-import numpy \
            --hidden-import pygame \
            --hidden-import cairosvg \
            --hidden-import cssselect2 \
            --hidden-import tinycss2 \
            --hidden-import cairocffi \
            photocd_decoder.py

      - name: Ad-hoc sign the app
        run: |
          codesign --force --deep --sign - "dist/Photo CD Player.app"

      - name: Create DMG
        run: |
          brew install create-dmg
          create-dmg \
            --volname "Photo CD Player" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "Photo CD Player.app" 150 185 \
            --hide-extension "Photo CD Player.app" \
            --app-drop-link 450 185 \
            "dist/Photo CD Player.dmg" \
            "dist/Photo CD Player.app"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PhotoCDPlayer-macOS
          path: dist/Photo CD Player.dmg
          retention-days: 1

  build-linux:
    name: Linux AppImage
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y libgirepository1.0-dev libcairo2-dev pkg-config \
            python3-dev gir1.2-gtk-3.0 libgtk-3-dev fuse

      - name: Install Python dependencies
        run: pip install pillow numpy pygame cairosvg pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller --noconfirm --windowed --onedir \
            --name "Photo CD Player" \
            --add-data "assets:assets" \
            --add-data "photocd_fs_reader.py:." \
            --add-data "photocd_disc_map.py:." \
            --add-data "photocd_hires.py:." \
            --add-data "photocd_playlist_parse.py:." \
            --hidden-import PIL \
            --hidden-import PIL.Image \
            --hidden-import PIL.ImageTk \
            --hidden-import numpy \
            --hidden-import pygame \
            --hidden-import cairosvg \
            --hidden-import cssselect2 \
            --hidden-import tinycss2 \
            --hidden-import cairocffi \
            photocd_decoder.py

      - name: Package as AppImage
        run: |
          wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" -O appimagetool
          chmod +x appimagetool

          mkdir -p AppDir/usr/bin AppDir/usr/share/applications AppDir/usr/share/icons/hicolor/256x256/apps
          cp -r "dist/Photo CD Player/"* AppDir/usr/bin/
          cp "App Icon/PhotoCDLogo.png" AppDir/usr/share/icons/hicolor/256x256/apps/photocd-player.png
          cp "App Icon/PhotoCDLogo.png" AppDir/photocd-player.png

          cat > AppDir/usr/share/applications/photocd-player.desktop << 'EOF'
          [Desktop Entry]
          Name=Photo CD Player
          Comment=Play Kodak Photo CD disc images
          Exec=Photo CD Player
          Icon=photocd-player
          Type=Application
          Categories=Graphics;Viewer;
          EOF
          cp AppDir/usr/share/applications/photocd-player.desktop AppDir/photocd-player.desktop

          cat > AppDir/AppRun << 'EOF'
          #!/bin/bash
          SELF=$(readlink -f "$0")
          HERE=$(dirname "$SELF")
          exec "$HERE/usr/bin/Photo CD Player" "$@"
          EOF
          chmod +x AppDir/AppRun

          ARCH=x86_64 ./appimagetool AppDir "PhotoCDPlayer-Linux.AppImage"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PhotoCDPlayer-Linux
          path: PhotoCDPlayer-Linux.AppImage
          retention-days: 1

  release:
    name: Publish Release
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.00
          name: Photo CD Player v1.00
          draft: false
          prerelease: false
          make_latest: true
          body: |
            ## Photo CD Player v1.00

            Decodes and plays Kodak Photo CD disc images (.cue/.bin).

            ### Downloads
            | Platform | File |
            |----------|------|
            | macOS (ARM64) | `Photo CD Player.dmg` |
            | Windows | `PhotoCDPlayer-Windows.zip` |
            | Linux | `PhotoCDPlayer-Linux.AppImage` |

            ### Supported formats
            - Photo CD Master (Base, 4Base, 16Base)
            - Photo CD Portfolio (Base)
            - Standalone `.pcd` and `.rgb` files
          files: |
            artifacts/PhotoCDPlayer-macOS/Photo CD Player.dmg
            artifacts/PhotoCDPlayer-Windows/PhotoCDPlayer-Windows.zip
            artifacts/PhotoCDPlayer-Linux/PhotoCDPlayer-Linux.AppImage
